<div class="semester-page">

    <div class="header">
        <h1>Select Your Semester</h1>
        <p>Choose a semester to access notes, videos and question papers.</p>
    </div>

    <div class="semester-grid">

        <div class="semester-card" (click)="openSemester(1)">
            <span class="icon">📘</span>
            <h2>Semester 1</h2>
        </div>

        <div class="semester-card" (click)="openSemester(2)">
            <span class="icon">📗</span>
            <h2>Semester 2</h2>
        </div>

        <div class="semester-card" (click)="openSemester(3)">
            <span class="icon">📙</span>
            <h2>Semester 3</h2>
        </div>

        <div class="semester-card" (click)="openSemester(4)">
            <span class="icon">📕</span>
            <h2>Semester 4</h2>
        </div>

        <div class="semester-card" (click)="openSemester(5)">
            <span class="icon">💻</span>
            <h2>Semester 5</h2>
        </div>

        <div class="semester-card" (click)="openSemester(6)">
            <span class="icon">🖥️</span>
            <h2>Semester 6</h2>
        </div>

        <div class="semester-card" (click)="openSemester(7)">
            <span class="icon">🚀</span>
            <h2>Semester 7</h2>
        </div>

        <div class="semester-card" (click)="openSemester(8)">
            <span class="icon">🎓</span>
            <h2>Semester 8</h2>
        </div>

    </div>

</div>
