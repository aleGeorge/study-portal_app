<div class="subjects-container">

  <h1>
    Semester {{ semesterNumber }} Subjects
  </h1>

  <p class="count">
    Total Subjects: {{ subjects.length }}
  </p>

  <div
    class="subject-card"
    *ngFor="let subject of subjects">

    <h3>
      {{ subject.subjectCode }}
    </h3>

    <p>
      {{ subject.subjectName }}
    </p>

    <button class="start-btn">
      Start Learning
    </button>

  </div>

</div>
